version: "3.9"

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"

  frontend:
    build: ../frontend
    ports:
      - "3000:4173"

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"